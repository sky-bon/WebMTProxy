<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto прокси Telegram</title>
    <!-- Подключаем шрифты Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Commissioner:wght@400;700&display=swap');
    </style>
    <style>
        /* Общие сбросы и тёмная тема */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Commissioner', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            flex: 1; /* занимает всё доступное место, прижимая footer вниз */
        }

        h1 {
            font-size: 2rem;
            margin: 20px 0 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            text-transform: uppercase;
            font-family: 'Commissioner', sans-serif;
        }

        .description {
            margin: 15px 0;
            font-size: 1rem;
            color: #8b949e;
            font-family: 'Commissioner', sans-serif;
        }

        #status {
            background: #161b22;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #30363d;
            font-size: 1rem;
            color: #8b949e;
            font-family: 'IBM Plex Mono', monospace;
        }

        #links {
            margin: 25px 0;
        }

        #links p {
            margin-bottom: 8px;
        }

        #links a {
            display: block;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px 15px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.95rem;
            word-break: break-all;
            transition: background-color 0.2s ease;
            border-radius: 0;
            font-family: 'IBM Plex Mono', monospace;
        }

        #links a:hover {
            background: #1f2937;
            border-color: #3b82f6;
        }

        #links a:visited {
            color: #8b949e;
            border-color: #2d3748;
        }

        .fallback {
            margin-top: 30px;
            text-align: center;
        }

        .fallback a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px solid #3b82f6;
        }

        .fallback a:hover {
            color: #8b949e;
            border-bottom-color: #8b949e;
        }

        /* Стили подвала */
        footer {
            width: 100%;
            max-width: 1000px;
            margin: 30px auto 10px;
            padding: 15px 20px 10px;
            text-align: center;
            color: #6e7681;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            border-top: 1px solid #30363d;
        }

        footer a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid #6e7681;
        }

        footer a:hover {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }

        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            #links a {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            #status {
                padding: 10px;
            }

            footer {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MTProto прокси для Telegram</h1>
        <div class="description">
            Список обновляется автоматически каждые 12 часов.<br>
            Нажмите на ссылку, чтобы открыть её в Telegram.
        </div>

        <div id="status">Загрузка списка прокси...</div>
        <div id="links"></div>

        <div class="fallback" id="fallback" style="display: none;">
            <a href="https://github.com/SoliSpirit/mtproto/blob/master/all_proxies.txt" target="_blank">Посмотреть список в репозитории</a>
        </div>
    </div>

    <footer>
        <span><span>original </span><a href="https://github.com/SoliSpirit/mtproto/blob/master/README_RU.md" target="_blank" rel="noopener noreferrer">SoliSpirit</a> • <span id="update-time">загрузка...</span></span>
    </footer>

    <script>
        // === Функция загрузки прокси ===
        function loadProxies() {
            const statusDiv = document.getElementById('status');
            const linksDiv = document.getElementById('links');
            const fallbackDiv = document.getElementById('fallback');

            linksDiv.innerHTML = '';
            fallbackDiv.style.display = 'none';

            fetch('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка HTTP: ${response.status}`);
                    }
                    return response.text();
                })
                .then(data => {
                    const lines = data.split('\n')
                        .map(line => line.trim())
                        .filter(line => line.length > 0);

                    if (lines.length === 0) {
                        statusDiv.innerHTML = 'Список прокси пуст.';
                        fallbackDiv.style.display = 'block';
                        return;
                    }

                    // Фильтруем только ссылки на прокси
                    const proxyLines = lines.filter(line => line.startsWith('https://t.me/proxy?'));

                    if (proxyLines.length === 0) {
                        statusDiv.innerHTML = 'Не найдено ссылок на прокси.';
                        console.log('Первые строки файла (для проверки):', lines.slice(0, 3));
                        fallbackDiv.style.display = 'block';
                        return;
                    }

                    statusDiv.innerHTML = `Загружено ${proxyLines.length} прокси (обновление каждые 12 часов)`;

                    proxyLines.forEach(line => {
                        const p = document.createElement('p');
                        const a = document.createElement('a');
                        a.href = line;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';

                        // Сокращаем отображение для длинных ссылок
                        if (line.length > 70) {
                            const shortLine = line.substring(0, 45) + '...' + line.substring(line.length - 25);
                            a.textContent = shortLine;
                            a.title = line;
                        } else {
                            a.textContent = line;
                        }

                        p.appendChild(a);
                        linksDiv.appendChild(p);
                    });
                })
                .catch(error => {
                    console.error('Ошибка загрузки:', error);
                    statusDiv.innerHTML = `Не удалось загрузить список прокси.<br><small>${error.message}</small>`;
                    fallbackDiv.style.display = 'block';
                });
        }

        // === Функция получения времени последнего коммита из репозитория-источника ===
        function fetchLastCommitTime() {
            const updateTimeSpan = document.getElementById('update-time');
            fetch('https://api.github.com/repos/SoliSpirit/mtproto/commits?per_page=1')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data && data.length > 0) {
                        const commitDate = data[0].commit.committer.date;
                        const date = new Date(commitDate);
                        // Форматируем: день.месяц.год часы:минуты
                        const formatted = date.toLocaleString('ru', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        }).replace(',', '');
                        updateTimeSpan.textContent = formatted;
                    } else {
                        updateTimeSpan.textContent = 'неизвестно';
                    }
                })
                .catch(error => {
                    console.error('Ошибка получения времени коммита:', error);
                    updateTimeSpan.textContent = 'неизвестно';
                });
        }

        // Запускаем загрузку прокси и времени последнего коммита
        loadProxies();
        fetchLastCommitTime();

        // Обновляем прокси каждые 10 минут (время коммита при этом не обновляем, чтобы меньше грузить API)
        setInterval(loadProxies, 10 * 60 * 1000);
    </script>
</body>
</html>
