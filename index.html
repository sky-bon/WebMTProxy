<!DOCTYPE html>
<html>
<head>
    <title>Актуальные MTProto прокси</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .proxy-link { 
            display: block; 
            margin-bottom: 10px; 
            padding: 10px; 
            background: #f5f5f5; 
            border-radius: 5px;
            word-break: break-all;
        }
        .update-time { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🔄 Свежие MTProto прокси для Telegram</h1>
    <p class="update-time">Список обновляется автоматически каждые 12 часов.</p>
    <p>Нажмите на ссылку, чтобы открыть её в Telegram.</p>
    <div id="proxies-list">Загрузка списка прокси...</div>

    <script>
        async function loadProxies() {
            try {
                // Загружаем файл напрямую из репозитория SoliSpirit
                const response = await fetch('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt');
                if (!response.ok) throw new Error('Ошибка загрузки');
                const text = await response.text();
                
                const proxiesDiv = document.getElementById('proxies-list');
                proxiesDiv.innerHTML = ''; // Очищаем сообщение о загрузке
                
                // Разбиваем на строки и фильтруем пустые
                const lines = text.split('\n').filter(line => line.trim() !== '');
                
                if (lines.length === 0) {
                    proxiesDiv.innerHTML = '<p>Список прокси временно пуст.</p>';
                    return;
                }
                
                // Создаём ссылку для каждой прокси
                lines.forEach(line => {
                    const proxyLink = document.createElement('a');
                    proxyLink.href = line.trim();
                    proxyLink.className = 'proxy-link';
                    proxyLink.target = '_blank'; // Открывать в новой вкладке
                    proxyLink.textContent = line.length > 60 ? line.substring(0, 60) + '...' : line;
                    proxiesDiv.appendChild(proxyLink);
                });
                
                // Добавляем информацию о количестве
                const countInfo = document.createElement('p');
                countInfo.innerHTML = `<small>✅ Загружено ${lines.length} рабочих прокси</small>`;
                proxiesDiv.prepend(countInfo);
                
            } catch (error) {
                document.getElementById('proxies-list').innerHTML = 
                    '<p style="color: red;">❌ Не удалось загрузить список прокси. Попробуйте позже.</p>';
                console.error('Ошибка:', error);
            }
        }
        
        loadProxies();
    </script>
</body>
</html>
