<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto прокси Telegram</title>
    <style>
        /* Тёмная тема, моноширинный шрифт, без скруглений */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, 'Consolas', monospace; /* Поддерживает кириллицу */
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin: 20px 0 10px;
            font-weight: 600;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .description {
            margin: 15px 0;
            font-size: 1rem;
            color: #8b949e;
        }

        #status {
            background: #161b22;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #30363d;
            font-size: 1rem;
            color: #8b949e;
        }

        #links {
            margin: 25px 0;
        }

        /* Стиль для каждой ссылки (без скруглений) */
        #links p {
            margin-bottom: 8px;
        }

        #links a {
            display: block;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 12px 15px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.95rem;
            word-break: break-all;
            transition: background-color 0.2s ease;
            border-radius: 0; /* Убрали скругления */
        }

        #links a:hover {
            background: #1f2937;
            border-color: #3b82f6;
        }

        #links a:visited {
            color: #8b949e;
            border-color: #2d3748;
        }

        .fallback {
            margin-top: 30px;
            text-align: center;
        }

        .fallback a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px solid #3b82f6;
        }

        .fallback a:hover {
            color: #8b949e;
            border-bottom-color: #8b949e;
        }

        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            #links a {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            #status {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MTProto прокси для Telegram</h1>
        <div class="description">
            Список обновляется автоматически каждые 12 часов.<br>
            Нажмите на ссылку, чтобы открыть её в Telegram.
        </div>

        <div id="status">Загрузка списка прокси...</div>
        <div id="links"></div>

        <div class="fallback" id="fallback" style="display: none;">
            <a href="https://github.com/SoliSpirit/mtproto/blob/master/all_proxies.txt" target="_blank">Посмотреть список в репозитории</a>
        </div>
    </div>

    <script>
        // Рабочий код загрузки из первого варианта (проверен)
        function loadProxies() {
            const statusDiv = document.getElementById('status');
            const linksDiv = document.getElementById('links');
            const fallbackDiv = document.getElementById('fallback');

            // Очищаем предыдущее содержимое
            linksDiv.innerHTML = '';
            fallbackDiv.style.display = 'none';

            fetch('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка HTTP: ${response.status}`);
                    }
                    return response.text();
                })
                .then(data => {
                    // Разбиваем на строки, убираем пустые и лишние пробелы
                    const lines = data.split('\n')
                        .map(line => line.trim())
                        .filter(line => line.length > 0);

                    if (lines.length === 0) {
                        statusDiv.innerHTML = 'Список прокси пуст.';
                        fallbackDiv.style.display = 'block';
                        return;
                    }

                    statusDiv.innerHTML = `Загружено ${lines.length} прокси (обновление каждые 12 часов)`;

                    // Создаём ссылки для каждой строки
                    lines.forEach(line => {
                        // Проверяем, что строка похожа на ссылку tg://
                        if (!line.startsWith('tg://')) {
                            console.warn('Пропущена строка (не tg://):', line);
                            return;
                        }

                        const p = document.createElement('p');
                        const a = document.createElement('a');
                        a.href = line;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';

                        // Сокращаем отображение для длинных ссылок
                        if (line.length > 70) {
                            const shortLine = line.substring(0, 45) + '...' + line.substring(line.length - 25);
                            a.textContent = shortLine;
                            a.title = line;
                        } else {
                            a.textContent = line;
                        }

                        p.appendChild(a);
                        linksDiv.appendChild(p);
                    });

                    // Если ни одна строка не прошла проверку
                    if (linksDiv.children.length === 0) {
                        statusDiv.innerHTML = 'Не найдено валидных прокси.';
                        fallbackDiv.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Ошибка загрузки:', error);
                    statusDiv.innerHTML = `Не удалось загрузить список прокси.<br><small>${error.message}</small>`;
                    fallbackDiv.style.display = 'block';
                });
        }

        // Загружаем при старте и обновляем каждые 10 минут
        loadProxies();
        setInterval(loadProxies, 10 * 60 * 1000);
    </script>
</body>
</html>
