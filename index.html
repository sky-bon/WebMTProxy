<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTProto прокси Telegram</title>
    <style>
        /* Общие сбросы и тёмная тема */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d1117;   /* тёмный фон GitHub */
            color: #c9d1d9;               /* светлый текст */
            font-family: 'Courier New', Courier, 'Consolas', monospace;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        /* Заголовок */
        h1 {
            font-size: 2rem;
            margin: 20px 0 10px;
            font-weight: 600;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Описание и статус */
        .description {
            margin: 15px 0;
            font-size: 1rem;
            color: #8b949e;
        }

        .status {
            background: #161b22;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #30363d;
            font-size: 1rem;
        }

        /* Список прокси */
        .proxies-list {
            margin: 25px 0;
        }

        .proxy-link {
            display: block;
            background: #161b22;
            border: 1px solid #30363d;
            margin-bottom: 8px;
            padding: 12px 15px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.95rem;
            word-break: break-all;
            transition: background-color 0.2s ease;
            border-radius: 0; /* убрали скругления */
        }

        .proxy-link:hover {
            background: #1f2937;
            border-color: #3b82f6;
        }

        /* Посещённая ссылка */
        .proxy-link:visited {
            color: #8b949e;
            border-color: #2d3748;
        }

        /* Информация о количестве */
        .count-info {
            margin: 15px 0 5px;
            padding: 8px 0;
            border-bottom: 1px dashed #30363d;
            color: #8b949e;
        }

        /* Запасная ссылка на репозиторий */
        .fallback {
            margin-top: 30px;
            text-align: center;
        }

        .fallback a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px solid #3b82f6;
        }

        .fallback a:hover {
            color: #8b949e;
            border-bottom-color: #8b949e;
        }

        /* Адаптация для мобильных */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .proxy-link {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .status {
                padding: 10px;
            }
        }

        /* Утилиты */
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MTProto прокси для Telegram</h1>
        <div class="description">
            Список обновляется автоматически каждые 12 часов.<br>
            Нажмите на ссылку, чтобы открыть её в Telegram.
        </div>

        <div id="status" class="status">Загрузка списка прокси...</div>
        <div id="proxies-list" class="proxies-list"></div>
    </div>

    <script>
        async function loadProxies() {
            const statusDiv = document.getElementById('status');
            const proxiesDiv = document.getElementById('proxies-list');
            
            proxiesDiv.innerHTML = '';
            
            try {
                // Используем прямой URL к raw-файлу
                const response = await fetch('https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt');
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка ${response.status}`);
                }
                
                const text = await response.text();
                
                const lines = text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line && line.startsWith('tg://'));
                
                if (lines.length === 0) {
                    statusDiv.innerHTML = 'Список прокси пуст или имеет неправильный формат.';
                    return;
                }
                
                statusDiv.innerHTML = `Загружено ${lines.length} прокси (обновление каждые 12 часов)`;
                
                // Контейнер для количества (можно добавить отдельно, но включим в статус)
                // Просто выведем ссылки
                lines.forEach(line => {
                    const proxyLink = document.createElement('a');
                    proxyLink.href = line;
                    proxyLink.className = 'proxy-link';
                    proxyLink.target = '_blank';
                    proxyLink.rel = 'noopener noreferrer';
                    
                    // Сокращаем отображение для читаемости
                    if (line.length > 70) {
                        const shortLine = line.substring(0, 45) + '...' + line.substring(line.length - 25);
                        proxyLink.textContent = shortLine;
                        proxyLink.title = line;
                    } else {
                        proxyLink.textContent = line;
                    }
                    
                    proxiesDiv.appendChild(proxyLink);
                });
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                
                statusDiv.innerHTML = `
                    Не удалось загрузить список прокси.<br>
                    <small style="color: #f85149;">Ошибка: ${error.message}</small><br>
                    <br>
                    Попробуйте обновить страницу позже или посмотрите список напрямую в 
                    <a href="https://github.com/SoliSpirit/mtproto/blob/master/all_proxies.txt" 
                       target="_blank" style="color: #58a6ff;">репозитории</a>.
                `;
                
                proxiesDiv.innerHTML = ''; // очищаем, если там что-то было
            }
        }
        
        loadProxies();
        // Обновление каждые 10 минут (опционально)
        setInterval(loadProxies, 10 * 60 * 1000);
    </script>
</body>
</html>
